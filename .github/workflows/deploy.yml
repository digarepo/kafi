name: Deploy Kafi Monorepo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout FULL history (IMPORTANT for nx affected)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Get affected projects
      - name: Determine affected projects
        id: nx
        run: |
          npx nx show projects --affected --base=HEAD~1 --head=HEAD > affected.txt
          cat affected.txt

      # 5. Build affected projects only
      - name: Build affected apps
        run: npx nx affected -t build --base=HEAD~1 --head=HEAD

      # 6. Prepare deployment package
      - name: Create deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy

          # Root workspace files
          cp package.json deploy/
          cp package-lock.json deploy/
          cp nx.json deploy/
          cp tsconfig.base.json deploy/

          # ---------- Packages ----------
          mkdir -p deploy/packages/ui
          cp packages/ui/package.json deploy/packages/ui/
          cp -R packages/ui/dist deploy/packages/ui/

          # CSS export
          mkdir -p deploy/packages/ui/src/styles
          cp packages/ui/src/styles/base.css deploy/packages/ui/src/styles/

          # ---------- WEB ----------
          if [ -d "apps/web/build" ]; then
            mkdir -p deploy/apps/web

            cp apps/web/package.json deploy/apps/web/
            cp deployment/react-router/server.js deploy/apps/web/
            cp deployment/react-router/start.cjs deploy/apps/web/

            cp -R apps/web/build deploy/apps/web/
            cp -R apps/web/public deploy/apps/web/

            mkdir -p deploy/apps/web/tmp
          fi

          # ---------- ADMIN ----------
          if [ -d "apps/admin/build" ]; then
            mkdir -p deploy/apps/admin

            cp apps/admin/package.json deploy/apps/admin/
            cp deployment/react-router/server.js deploy/apps/admin/
            cp deployment/react-router/start.cjs deploy/apps/admin/

            cp -R apps/admin/build deploy/apps/admin/
            cp -R apps/admin/public deploy/apps/admin/

            mkdir -p deploy/apps/admin/tmp
          fi

          # ---------- API ----------
          if [ -d "apps/api/dist" ]; then
            mkdir -p deploy/apps/api

            cp apps/api/package.json deploy/apps/api/
            cp deployment/api/start.cjs deploy/apps/api/

            cp -R apps/api/dist deploy/apps/api/

            mkdir -p deploy/apps/api/tmp
          fi

      # Step 7: Upload the deploy folder
      - name: Upload to cPanel
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.CPANEL_USER }}
          server: ${{ secrets.CPANEL_HOST }}
          ssh_private_key: ${{ secrets.CPANEL_DEPLOY_KEY }}
          local_path: ./deploy
          remote_path: /home/${{ secrets.CPANEL_USER }}/kafi/
          port: 22
          sftp_only: true
          delete_remote_files: false

      # Step 8: Move files into place and restart Passenger apps
      - name: Install and restart
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

          ssh ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} << 'EOF'
            set -e

            cd /home/${{ secrets.CPANEL_USER }}/kafi

            # Copy workspace files
            cp -f deploy/package.json .
            cp -f deploy/package-lock.json .
            cp -f deploy/nx.json .
            cp -f deploy/tsconfig.base.json .

            rm -rf packages
            cp -R deploy/packages .

            mkdir -p apps

            # Replace only the apps that were deployed
            for app in web admin api; do
              if [ -d "deploy/apps/$app" ]; then
                rm -rf "apps/$app"
                cp -R "deploy/apps/$app" "apps/$app"
              fi
            done

            # Install production dependencies for the workspace
            npm install --omit=dev

            # Restart Passenger
            [ -d apps/web/tmp ] && touch apps/web/tmp/restart.txt || true
            [ -d apps/admin/tmp ] && touch apps/admin/tmp/restart.txt || true
            [ -d apps/api/tmp ] && touch apps/api/tmp/restart.txt || true

            rm -rf deploy
          EOF
