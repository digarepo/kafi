name: Deploy Kafi Monorepo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout FULL history (IMPORTANT for nx affected)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Get affected projects
      - name: Determine affected projects
        id: nx
        run: |
          npx nx show projects --affected --base=HEAD~1 --head=HEAD > affected.txt
          cat affected.txt

      # 5. Build affected projects only
      - name: Build affected apps
        run: npx nx affected -t build --base=HEAD~1 --head=HEAD

      - name: Pack UI package
        run: |
          npm pack ./packages/ui

      # 6. Prepare deployment package
      - name: Create deploy package
        run: |
          rm -rf deploy
          mkdir deploy

          UI_PACKAGE=$(ls kafi-ui-*.tgz)

          #################################
          # WEB
          #################################

          mkdir -p deploy/web

          cp apps/web/package.json deploy/web/
          cp "$UI_PACKAGE" deploy/web/
          node deployment/prepare-package-json.mjs deploy/web/package.json "$UI_PACKAGE"

          cp deployment/react-router/server.js deploy/web/
          cp deployment/react-router/start.cjs deploy/web/

          cp -R apps/web/build deploy/web/
          cp -R apps/web/public deploy/web/

          mkdir deploy/web/tmp

          #################################
          # ADMIN
          #################################

          mkdir -p deploy/admin

          cp apps/admin/package.json deploy/admin/
          cp "$UI_PACKAGE" deploy/admin/
          node deployment/prepare-package-json.mjs deploy/admin/package.json "$UI_PACKAGE"

          cp deployment/react-router/server.js deploy/admin/
          cp deployment/react-router/start.cjs deploy/admin/

          cp -R apps/admin/build deploy/admin/
          cp -R apps/admin/public deploy/admin/

          mkdir deploy/admin/tmp

          #################################
          # API
          #################################

          mkdir -p deploy/api

          cp apps/api/package.json deploy/api/
          cp package-lock.json deploy/api/

          cp deployment/api/start.cjs deploy/api/

          cp -R apps/api/dist deploy/api/

          mkdir deploy/api/tmp

      - name: Verify deployment package
        run: |
          echo "WEB"
          test -f deploy/web/package.json
          test -f deploy/web/kafi-ui-1.0.0.tgz
          test -f deploy/web/build/server/index.js

          echo "ADMIN"
          test -f deploy/admin/package.json
          test -f deploy/admin/kafi-ui-1.0.0.tgz
          test -f deploy/admin/build/server/index.js

          echo "API"
          test -f deploy/api/package.json
          test -d deploy/api/dist

          echo "Deployment package looks good"

      # Step 7: Upload the deploy folder
      - name: Upload Web
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.CPANEL_USER }}
          server: ${{ secrets.CPANEL_HOST }}
          ssh_private_key: ${{ secrets.CPANEL_DEPLOY_KEY }}
          local_path: ./deploy/web/
          remote_path: /home/${{ secrets.CPANEL_USER }}/kafitour.com
          port: 22
          sftp_only: true
          delete_remote_files: false

      - name: Upload Admin
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.CPANEL_USER }}
          server: ${{ secrets.CPANEL_HOST }}
          ssh_private_key: ${{ secrets.CPANEL_DEPLOY_KEY }}
          local_path: ./deploy/admin/
          remote_path: /home/${{ secrets.CPANEL_USER }}/admin.kafitour.com
          port: 22
          sftp_only: true
          delete_remote_files: false

      - name: Upload API
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.CPANEL_USER }}
          server: ${{ secrets.CPANEL_HOST }}
          ssh_private_key: ${{ secrets.CPANEL_DEPLOY_KEY }}
          local_path: ./deploy/api/
          remote_path: /home/${{ secrets.CPANEL_USER }}/api.kafitour.com
          port: 22
          sftp_only: true
          delete_remote_files: false

      # Step 8: Install dependencies and restart Passenger apps
      - name: Install dependencies and restart Passenger
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.CPANEL_DEPLOY_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

          ssh ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} << 'EOF'
          set -e

          echo "Installing web dependencies..."

          cd /home/${{ secrets.CPANEL_USER }}/kafitour.com

          rm -rf build public server.js

          npm install --omit=dev

          test -d node_modules/@kafi/ui

          touch tmp/restart.txt


          echo "Installing admin dependencies..."

          cd /home/${{ secrets.CPANEL_USER }}/admin.kafitour.com

          rm -rf build public server.js

          npm install --omit=dev

          test -d node_modules/@kafi/ui

          touch tmp/restart.txt


          echo "Installing api dependencies..."

          cd /home/${{ secrets.CPANEL_USER }}/api.kafitour.com

          rm -rf dist node_modules

          npm ci --omit=dev

          test -d node_modules

          touch tmp/restart.txt


          echo "Deployment complete"

          EOF
